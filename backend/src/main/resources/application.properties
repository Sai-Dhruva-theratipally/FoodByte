spring.application.name=foodbyte-backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/foodapp?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# CORS (frontend dev server)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Optional: allow registering ADMIN users.
# Recommended: keep this false and manually promote admins in DB.
# Set env var: APP_ALLOW_ADMIN_REGISTRATION=true
app.security.allow-admin-registration=${APP_ALLOW_ADMIN_REGISTRATION:false}

# JWT Configuration
jwt.secret=your_secret_key_change_this_in_production_minimum_256_bits
jwt.expiration=86400000

# Local media uploads (used for Restaurant/Product images)
# Files are stored on disk and served via GET /api/uploads/**
app.media.upload-dir=${APP_MEDIA_UPLOAD_DIR:./uploads}
app.media.public-path=${APP_MEDIA_PUBLIC_PATH:/uploads}
app.media.default-folder=${APP_MEDIA_DEFAULT_FOLDER:foodbyte}

# Upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Configuration
server.port=8080
server.servlet.context-path=/api
